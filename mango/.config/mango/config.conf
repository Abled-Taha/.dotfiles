# More option see https://github.com/DreamMaoMao/mango/wiki/

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=6
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.5

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=0
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=1
focus_cross_tag=1
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=1
xkb_rules_layout=us,pk
xkb_rules_variant=,pak_urdu_phonetic
xkb_rules_options=compose:sclk,grp:alt_shift_toggle

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=0
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=1
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:tile
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=Super,r,reload_config

# menu and terminal
bind=Super,Space,spawn,$MENU
bind=Super,Return,spawn,$TERMINAL
bind=Super,q,killclient,

# scripts
bind=Super+Ctrl,p,spawn,shutdown now
bind=Super+Ctrl+Alt,p,spawn,shutdown -r now
bind=Super+Shift,s,spawn,/home/abledtaha/.dotfiles/scripts/screenshot.sh
bind=Super+Shift,c,spawn,dunstify -r 9910 -a "System" -i "clock" "Current Time" "$(date +'%A, %B %d - %I:%M %p')"

# exit
bind=Super+Ctrl+Alt,q,quit

# laptop keys
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%-
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=Ctrl,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=none,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=Ctrl,XF86AudioRaiseVolume,spawn,brightnessctl -e4 -n2 set 5%+
bind=none,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-
bind=Ctrl,XF86AudioLowerVolume,spawn,brightnessctl -e4 -n2 set 5%-

# apps
bind=Super+Shift,b,spawn,$BROWSER
bind=Super+Shift,f,spawn,$FILE_MANAGER
bind=Super+Shift,n,spawn,$TEXT_EDITOR
bind=Super+Shift,t,spawn,$TERMINAL -e btop

bind=Super+Shift,g,spawn,$BROWSER gemini.google.com
bind=Super+Shift,y,spawn,$BROWSER youtube.com

# switch window focus
#bind=Super,Tab,focusstack,next
bind=Super,a,focusdir,left
bind=Super,d,focusdir,right
bind=Super,w,focusdir,up
bind=Super,s,focusdir,down

# swap window
bind=Super+Alt,w,exchange_client,up
bind=Super+Alt,s,exchange_client,down
bind=Super+Alt,a,exchange_client,left
bind=Super+Alt,d,exchange_client,right

# switch window status
bind=Alt,t,togglefloating,
bind=Alt,f,togglefullscreen,
#bind=Super,g,toggleglobal,
#bind=Alt,Tab,toggleoverview,
#bind=Alt,a,togglemaximizescreen,
#bind=Alt+Shift,f,togglefakefullscreen,
#bind=Super,i,minimized,
#bind=Super,o,toggleoverlay,
#bind=Super+Shift,I,restore_minimized
#bind=Alt,z,toggle_scratchpad

# scroller layout
#bind=Alt,e,set_proportion,1.0
#bind=Alt,x,switch_proportion_preset,
#bind=alt+super+ctrl,a,scroller_stack,left
#bind=alt+super+ctrl,d,scroller_stack,right
#bind=alt+super+ctrl,w,scroller_stack,up
#bind=alt+super+ctrl,s,scroller_stack,down

#dwindle layout(manual split mode)
#bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
#bind=Super,n,switch_layout

# tag switch
#bind=Super,a,viewtoleft,0
#bind=Ctrl,a,viewtoleft_have_client,0
#bind=Super,d,viewtoright,0
#bind=Ctrl,d,viewtoright_have_client,0
#bind=Ctrl+Super,a,tagtoleft,0
#bind=Ctrl+Super,d,tagtoright,0

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
bind=Super+Alt,1,tag,1,0
bind=Super+Alt,2,tag,2,0
bind=Super+Alt,3,tag,3,0
bind=Super+Alt,4,tag,4,0
bind=Super+Alt,5,tag,5,0
bind=Super+Alt,6,tag,6,0
bind=Super+Alt,7,tag,7,0
bind=Super+Alt,8,tag,8,0
bind=Super+Alt,9,tag,9,0

# monitor switch
bind=Super+Ctrl,a,focusmon,left
bind=Super+Ctrl,d,focusmon,right
bind=Super+Ctrl+Alt,a,tagmon,left
bind=Super+Ctrl+Alt,d,tagmon,right

# gaps
#bind=Alt+Shift,X,incgaps,1
#bind=Alt+Shift,Z,incgaps,-1
#bind=Alt+Shift,R,togglegaps

# movewin
#bind=Ctrl+Shift,w,movewin,+0,-50
#bind=Ctrl+Shift,s,movewin,+0,+50
#bind=Ctrl+Shift,a,movewin,-50,+0
#bind=Ctrl+Shift,d,movewin,+50,+0

# resizewin
bind=Alt,w,resizewin,+0,-50
bind=Alt,s,resizewin,+0,+50
bind=Alt,a,resizewin,-50,+0
bind=Alt,d,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=Super,btn_left,moveresize,curmove
mousebind=Super,btn_right,moveresize,curresize
#mousebind=NONE,btn_middle,togglemaximizescreen,0


# Axis Bindings
#axisbind=Super,UP,viewtoleft_have_client
#axisbind=Super,DOWN,viewtoright_have_client


# layer rule
#layerrule=animation_type_open:zoom,layer_name:rofi
#layerrule=animation_type_close:zoom,layer_name:rofi

# Left Monitor (DP-2) - 1024x768 resolution starting at the 0,0 grid origin
monitorrule=name:^DP-2$,width:1024,height:768,refresh:60,x:0,y:0,scale:1

# Right Monitor (eDP-1 Laptop) - 1600x900 resolution shifted right by 1024 pixels
monitorrule=name:^eDP-1$,width:1600,height:900,refresh:60,x:1024,y:0,scale:1

source=./env.conf
exec-once=~/.config/mango/autostart.sh
