# Get a nerd font for symbols if you haven't already
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$package\
$rust\
$python\
$nodejs\
$nix_shell\
$character"""

[directory]
style = "bold cyan"
truncate_to_repo = true
truncation_length = 3

[git_branch]
symbol = "🌱 "
style = "bold magenta"

[git_status]
style = "bold red"

[nix_shell]
symbol = "❄️ "
format = "via [$symbol$name]($style) "
style = "bold blue"

[character]
success_symbol = "[λ](bold green) "
error_symbol = "[λ](bold red) "
